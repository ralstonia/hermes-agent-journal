<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Hermes Agent Journal flow diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="100%" stop-color="#0b1226"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="60%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <style>
      .title { font: 700 28px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; fill: #e5e7eb; }
      .label { font: 600 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; fill: #e5e7eb; }
      .text  { font: 500 15px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto; fill: #cbd5e1; }
      .mono  { font: 600 14px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas; fill: #94a3b8; }
    </style>
  </defs>

  <rect width="1200" height="520" fill="url(#bg)"/>

  <text x="60" y="70" class="title">Hermes Agent Journal: capture → triage → derived views (linked to source)</text>

  <!-- Box helper -->
  <g filter="url(#shadow)">
    <!-- Session -->
    <rect x="70" y="130" width="280" height="140" rx="18" fill="#0f172a" stroke="#22304f"/>
    <text x="95" y="165" class="label">Chat session</text>
    <text x="95" y="195" class="text">What happened (5–15 lines)</text>
    <text x="95" y="220" class="mono">/journal</text>

    <!-- Engine -->
    <rect x="430" y="120" width="340" height="160" rx="18" fill="#0f172a" stroke="#22304f"/>
    <rect x="430" y="120" width="340" height="6" fill="url(#accent)"/>
    <text x="455" y="155" class="label">Journal engine (skill)</text>
    <text x="455" y="185" class="text">• append-only minutes block</text>
    <text x="455" y="210" class="text">• promote triage (max 3+3)</text>
    <text x="455" y="235" class="text">• add block anchors for linking</text>

    <!-- Daily note -->
    <rect x="850" y="120" width="300" height="160" rx="18" fill="#0f172a" stroke="#22304f"/>
    <text x="875" y="155" class="label">Daily note</text>
    <text x="875" y="185" class="mono">&lt;JOURNAL_ROOT&gt;/YYYY-MM-DD.md</text>
    <text x="875" y="215" class="text">Triage at top + Minutes appended</text>
    <text x="875" y="240" class="mono">^d-YYYYMMDD-01  ^a-YYYYMMDD-01</text>

    <!-- Derived views -->
    <rect x="250" y="330" width="900" height="140" rx="18" fill="#0f172a" stroke="#22304f"/>
    <text x="275" y="365" class="label">Derived views (markdown)</text>
    <text x="275" y="395" class="mono">weekly/YYYY-WW.md   monthly/YYYY-MM.md</text>
    <text x="275" y="420" class="text">Every decision/action in the review links back to the exact source block:</text>
    <text x="275" y="445" class="mono">[[YYYY-MM-DD]]#^d-YYYYMMDD-01</text>
  </g>

  <!-- Arrows -->
  <g stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)">
  </g>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12" fill="#64748b"/>
    </marker>
  </defs>

  <path d="M350 200 C380 200, 395 200, 430 200" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M770 200 C800 200, 820 200, 850 200" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M1000 280 C1000 305, 850 330, 700 330" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M600 280 C600 305, 600 330, 600 330" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
</svg>
