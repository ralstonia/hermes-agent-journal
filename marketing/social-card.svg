<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="/journal social card">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070a14"/>
      <stop offset="50%" stop-color="#0b1630"/>
      <stop offset="100%" stop-color="#070a14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="55%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <rect x="90" y="110" width="1020" height="410" rx="28" fill="#0b1226" stroke="#1f2a44" filter="url(#shadow)"/>

  <rect x="120" y="150" width="10" height="330" rx="5" fill="url(#accent)"/>

  <text x="160" y="230" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="72" fill="#e5e7eb" font-weight="750">/journal</text>
  <text x="160" y="285" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="30" fill="#cbd5e1" font-weight="500">Triage-first session minutes for Obsidian daily notes</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas" font-size="22" fill="#94a3b8">
    <text x="160" y="355">append-only  |  privacy-safe templates  |  reviewable edits</text>
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="22" fill="#9ca3af">
    <text x="160" y="430"> Designed for local-first workflows (no cloud required)</text>
  </g>

  <text x="160" y="495" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="18" fill="#64748b">Draft marketing asset  replace brand marks as needed</text>
</svg>
