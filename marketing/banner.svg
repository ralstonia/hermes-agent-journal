<svg width="1600" height="400" viewBox="0 0 1600 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="/journal — Agentic journaling into Obsidian daily notes">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#111b34"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="1600" height="400" fill="url(#bg)"/>

  <!-- Accent bar -->
  <rect x="120" y="86" width="72" height="228" rx="16" fill="url(#accent)" filter="url(#shadow)"/>

  <!-- Title -->
  <text x="230" y="160" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="64" fill="#e5e7eb" font-weight="700">/journal</text>
  <text x="230" y="215" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="28" fill="#cbd5e1" font-weight="500">Agentic session minutes → Obsidian daily notes</text>

  <!-- Bullets -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="22" fill="#94a3b8">
    <text x="230" y="270">• Triage-first (3 decisions + 3 actions)</text>
    <text x="230" y="305">• Append-only minutes (don’t rewrite your prose)</text>
    <text x="230" y="340">• Privacy-safe templates (no hardcoded paths)</text>
  </g>

  <!-- Corner mark -->
  <g transform="translate(1260,78)">
    <rect x="0" y="0" width="260" height="76" rx="18" fill="#0f172a" stroke="#1f2a44"/>
    <text x="22" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas" font-size="22" fill="#e2e8f0">Hermes workflow</text>
  </g>
</svg>
